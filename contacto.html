<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Aroma Café</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
    <div class="logo">Aroma Café</div>
    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="contacto.html">Contact</a>
    </nav>
</header>

<section class="intro">
    <h2>Contact Us</h2>
    <p>We would love to hear from you. Visit us or send us a message.</p>
</section>

<section class="features">
    <div class="card">
        <h3>Address</h3>
        <p>15 Coffee Street, City Center</p>
    </div>

    <div class="card">
        <h3>Opening Hours</h3>
        <p>Monday - Sunday</p>
        <p>8:00 AM - 9:00 PM</p>
    </div>

    <div class="card">
        <h3>Email & Phone</h3>
        <p>info@aromacafe.com</p>
        <p>+34 600 123 456</p>
    </div>
</section>

<section class="contact-form-section">
    <div class="form-container">
        <h2>Send a Message</h2>
        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="Your Message" rows="6" required></textarea>
            <button type="submit" class="btn">Send</button>
        </form>
    </div>
</section>

<footer class="footer">
    <p>© 2026 Aroma Café</p>
</footer>

</body>
</html>
